name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_AUTH: neo4j/ebg_dev_password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p ebg_dev_password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: ebg
          POSTGRES_PASSWORD: ebg_dev_password
          POSTGRES_DB: ebg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ebg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run database migrations
        run: |
          npx tsx scripts/pg-migrate.ts
          npx tsx scripts/neo4j-init.ts
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ebg_dev_password
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: ebg
          PG_PASSWORD: ebg_dev_password
          PG_DATABASE: ebg

      - name: Seed data
        run: npx tsx scripts/seed.ts
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ebg_dev_password
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: ebg
          PG_PASSWORD: ebg_dev_password
          PG_DATABASE: ebg

      - name: Run tests
        run: npm test
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ebg_dev_password
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: ebg
          PG_PASSWORD: ebg_dev_password
          PG_DATABASE: ebg
          KAFKA_BROKERS: localhost:9094

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ebg-api:${{ github.sha }} .
